name: Generate profile pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/generate-teacher-pages.mjs
      - run: |
          git config user.name "moemzade-bot"
          git config user.email "actions@users.noreply.github.com"
          git add teacher sitemap.xml
          git diff --cached --quiet || git commit -m "Generate profile pages"
          git diff --cached --quiet || true
          git push