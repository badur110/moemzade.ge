name: Generate profile and SEO pages

on:
  workflow_dispatch:
  schedule:
    # Auto-generate approved teacher profile pages and SEO landing pages every 5 minutes.
    - cron: '*/5 * * * *'
  push:
    branches: [ main ]
    paths:
      - 'scripts/generate-teacher-pages.mjs'
      - '.github/workflows/generate-profiles.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/generate-teacher-pages.mjs
      - run: |
          git config user.name "moemzade-bot"
          git config user.email "actions@users.noreply.github.com"
          git add teacher teachers sitemap.xml
          if git diff --cached --quiet; then
            echo "No generated page changes"
          else
            git commit -m "Generate profile and SEO pages"
            git push
          fi
