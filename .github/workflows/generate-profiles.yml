name: Generate profile pages

on:
  workflow_dispatch:
  schedule:
    # Auto-generate approved teacher profile pages every 5 minutes.
    # When a teacher is approved in Google Sheets, their /teacher/{id}/ page
    # will be generated automatically on the next scheduled run.
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/generate-teacher-pages.mjs
      - run: |
          git config user.name "moemzade-bot"
          git config user.email "actions@users.noreply.github.com"
          git add teacher sitemap.xml
          if git diff --cached --quiet; then
            echo "No generated profile changes"
          else
            git commit -m "Generate profile pages"
            git push
          fi
